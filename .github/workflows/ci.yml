name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_loadtest:
        description: "Run authenticated dashboard load test (100 concurrent)"
        required: false
        default: false
        type: boolean

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gms_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gms_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gms_ci?schema=public
      REDIS_URL: redis://localhost:6379
      DASHBOARD_CACHE_TTL_SEC: "45"
      SLO_LATENCY_P95_MS: "300"
      SLO_ERROR_RATE_PCT: "1"
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 1d
      ADMIN_NAME: CI Admin
      ADMIN_EMAIL: admin.ci.gms@gmail.com
      ADMIN_PASSWORD: ChangeMe123!
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Prisma migrate deploy
        run: npm run prisma:migrate:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  server-loadtest:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_loadtest == true }}
    needs: server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gms_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gms_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gms_ci?schema=public
      REDIS_URL: redis://localhost:6379
      DASHBOARD_CACHE_TTL_SEC: "45"
      SLO_LATENCY_P95_MS: "300"
      SLO_ERROR_RATE_PCT: "1"
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 1d
      ADMIN_NAME: CI Admin
      ADMIN_EMAIL: admin.ci.gms@gmail.com
      ADMIN_PASSWORD: ChangeMe123!
      LOADTEST_BASE_URL: http://127.0.0.1:4000
      LOADTEST_ENDPOINT: /dashboard/admin/performance
      LOADTEST_ENFORCE_SLO: "true"
      LOADTEST_CONNECTIONS: "100"
      LOADTEST_DURATION_SEC: "20"
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Prisma migrate deploy
        run: npm run prisma:migrate:deploy

      - name: Seed admin
        run: npm run seed:admin

      - name: Build server
        run: npm run build

      - name: Start server
        run: nohup npm run start > server.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to become healthy"
          exit 1

      - name: Run authenticated dashboard load test
        run: npm run loadtest:dashboard:auth:100

      - name: Dump server log on failure
        if: failure()
        run: cat server.log

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
